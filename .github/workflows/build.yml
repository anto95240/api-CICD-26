name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ] # Se déclenche quand on fusionne ou pousse sur main

jobs:
  # 1. Vérification stricte du code (comme sur staging)
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Check formatting (Prettier)
        run: npm run format:check
        
      - name: Run Linter
        run: npm run lint
        
      - name: Build TypeScript
        run: npm run build
        
      - name: Run Unit Tests
        run: npm run test

  performance-test:
      needs: test-and-build
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            
        - run: npm ci
      
        - name: Generate Prisma Client
          run: npx prisma generate
          
        - name: Run Prisma Migrations
          run: npx prisma migrate dev --name init
          env:
            DATABASE_URL: "file:./dev.db" # <-- AJOUT ICI
            
        - name: Seed Database
          run: npx prisma db seed
          env:
            DATABASE_URL: "file:./dev.db" # <-- AJOUT ICI
            
        - run: npm run build
        
        # Lancer l'API en tâche de fond pour que K6 puisse la tester
        - name: Start API
          run: node dist/index.js &
          env:
            PORT: 3000
            DATABASE_URL: "file:./dev.db"
              
        - name: Wait for API to boot
          run: sleep 5
          
        # Exécuter le test de charge
        - name: Run k6 load test
          uses: grafana/k6-action@v0.3.1
          with:
            filename: tests/loadtest.js

  # 3. Build Docker et Déploiement en Production
  docker-and-deploy:
    needs: performance-test # Ne déploie QUE si les tests de perf passent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (Production)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Notez le tag "latest" au lieu de "staging"
          tags: ${{ secrets.DOCKER_USERNAME }}/api-cicd-26:latest 

      - name: Trigger Render Deployment (Production)
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          # Idéalement, vous devriez créer un secret RENDER_DEPLOY_HOOK_URL_PROD 
          # si vous avez un serveur Render différent pour la production.
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
