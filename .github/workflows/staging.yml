name: CI/CD - PR develop => staging

on:
  pull_request:
    branches: [staging]
    head:
      ref: develop

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run lint
        run: npm run lint
      - name: Run prettier
        run: npm run format:check
      - name: Run build
        run: npm run build
      - name: Run unit tests
        run: npm test

  build-and-deploy:
    needs: test-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/api-cicd:staging-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/api-cicd:staging-latest
      
      - name: Trigger deployment webhook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{"image_tag":"staging-${{ github.sha }}","environment":"staging"}'

  performance-test:
      needs: test-suite
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            
        - run: npm ci
        - run: npx prisma generate
        - run: npx prisma migrate dev --name init
        - run: npx prisma db seed
        - run: npm run build
        
        # Lancer l'API en tâche de fond pour que K6 puisse la tester
        - name: Start API
          run: node dist/index.js &
          env:
            PORT: 3000
            DATABASE_URL: "file:./dev.db"
            
        - name: Wait for API to boot
          run: sleep 5
          
        # Exécuter le test de charge
        - name: Run k6 load test
          uses: grafana/k6-action@v0.3.1
          with:
            filename: tests/loadtest.js